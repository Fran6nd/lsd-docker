# LSD server (lsd-dev.fran6nd.online). One knob for the port: set
# LSD_PORT in .env and both the container and the published port follow
# (the masterlist advertises the bound port, so they must match).
# config.lua is mounted from this directory, so config edits apply on
# restart and never touch the lsd submodule.
services:
  lsd:
    build: .
    image: lsd
    restart: unless-stopped
    init: true
    environment:
      LSD_PORT: ${LSD_PORT:-32887}
      LSD_CONFIG: ${LSD_CONFIG:-config.lua}
      LSD_NAME: ${LSD_NAME:-untitled LSd server}
      LSD_GAMEMODE: ${LSD_GAMEMODE:-ctf}
      LSD_MAPS: ${LSD_MAPS:-hallway bridgewars pinpoint}
    ports:
      - "${LSD_PORT:-32887}:${LSD_PORT:-32887}/udp"
    volumes:
      - ./config.lua:/lsd/config.lua:ro
      # content dirs: drop .vxl files in maps/, override or add
      # scripts/gamemodes in scripts.local/ (same-name file wins)
      - ./maps:/lsd/maps:ro
      - ./scripts.local:/lsd/scripts.local:ro
      - lsd-rw:/lsd/rw

volumes:
  lsd-rw:
    # fixed name so the bans/auth databases survive project moves/renames
    name: lsd-rw
